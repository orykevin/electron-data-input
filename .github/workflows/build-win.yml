# .github/workflows/build-win.yml
name: Build Windows EXE

on:
  push:
    branches: [main]        # triggers on every push to main
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Setup Python 3.11 (needed by node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Visual Studio Build Tools (required by node-gyp)
        shell: pwsh
        run: |
          choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --quiet" -y
          & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native modules for Electron
        env:
          GYP_MSVS_VERSION: '2022'
          DEBUG: 'electron-rebuild'
        run: npx electron-rebuild -f

      - name: Build Windows app
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: pnpm build:publish

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: pos-system-windows
          path: dist/*.exe          # your installer ends up here
          retention-days: 30