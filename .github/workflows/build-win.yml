# .github/workflows/build-win.yml
name: Build Windows EXE

on:
  push:
    branches: [main]        # triggers on every push to main
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Python 3.11 (needed by node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC compiler (node-gyp requirement)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Rebuild native modules for Electron
        env:
          GYP_MSVS_VERSION: '2022'
        run: npx electron-rebuild -f

      - name: Build Windows app
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: pnpm build:publish

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: pos-system-windows
          path: dist/*.exe          # your installer ends up here
          retention-days: 30